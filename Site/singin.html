<!doctype html>
<html lang="pt-br">
  <head>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Chonburi&display=swap"
      rel="stylesheet"
    />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign In Bookway</title>
    <link rel="stylesheet" href="./css/login-signin.css" />
  </head>
  <body>
    <header>
      <div class="logo">
        <img
          src="/Site/imagens/bookway.png"
          alt="Logo"
          width="240"
          height="50"
        />
      </div>
      <nav class="navegar">
        <ul>
          <li><a href="FAQ.html">Central de Ajuda</a></li>
          <li><a href="about-login.html">Sobre</a></li>
          <li><a href="contacts-login.html">Contato</a></li>
          <li><a href="home.html">home</a></li>
        </ul>
      </nav>
    </header>
    <main>
      <section class="imagemlogo">
        <img src="/Site/imagens/logo.jpg" alt="Logo" width="300" height="300" />
      </section>
      <form class="formulario">
        <h1>Sign In</h1>

        <div class="input-group">
          <label for="username">Nome de usuário:</label>
          <input type="text" id="username" name="username" required />
        </div>

        <div class="input-group">
          <label for="email">Email:</label>
          <input type="email" id="email" name="email" required />
        </div>

        <div class="input-group">
          <label for="password">Senha:</label>
          <input type="password" id="password" name="password" required />
        </div>

        <div class="input-group">
          <label for="repeatpassword">Repetir senha:</label>
          <input
            type="password"
            id="repeatpassword"
            name="repeatpassword"
            required
          />
        </div>

        <div class="action-group">
          <input type="submit" value="Sign In" id="bttn-cad" />
        </div>

        <div class="link">
          <p>Já tem uma conta? <a href="login.html">Entre</a></p>
        </div>
      </form>
    </main>
    <script src="./JS/script.js"></script>
  </body>
</html>
