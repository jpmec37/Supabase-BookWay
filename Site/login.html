<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Bookway</title>
    <link rel="stylesheet" href="./css/login-signin.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
     <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
      rel="stylesheet"
    />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Chonburi&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <div class="logo">
        <img src="/Site/imagens/bookway.png" alt="Logo" width="240" height="50">
        </div>
        <nav>
            <ul>
                <li><a href="FAQ.html">Central de Ajuda</a></li>
                <li><a href="about-login.html">Sobre</a></li>
                <li><a href="contacts-login.html">Contato</a></li>
            </ul>
        </nav>
    </header>
    <main>
    <section class="imagemlogo">
        <img src="/Site/imagens/logo.jpg" alt="Logo" width="300" height="300">
    </section>
    <form class="formulario">
        <h1>Log in</h1>

    <div class="input-group">
        <label for="email">Email:</label>
        <input type="email" id="email" name="email" required>
    </div>

    <div class="input-group">
        <label for="password">Senha:</label>
        <input type="password" id="password" name="password" required>
    </div>

    <div class="action-group">
        <input type="submit" value="Login" id="bttn-cad">
    </div>

    <div class="link">
        <p>Não tem uma conta? 
        <a href="singin.html">Cadastre-se</a></p>
    </div> 
       
    </form>
    
    </nav>
    </main> 
    <script src="./JS/script.js"></script>
</body>
</html>
